<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login User - RELHUB</title>

<link rel="stylesheet" href="../css/login-style.css">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <img src="../assets/logo.png" alt="logo">

        <h1>REL<span>HUB</span></h1>

        <p>
            Bergabunglah dalam aksi kemanusiaan
            melalui platform relawan dan donasi
            terpadu.
        </p>

    </div>

    <div class="right-panel">

        <div class="login-box">

            <h2>Login User</h2>

            <form>

                <div class="input-group">

                    <label>Email</label>

                    <input
                    type="email"
                    placeholder="Masukkan email">

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                    type="password"
                    placeholder="Masukkan password">

                </div>

                <button>

                    Login

                </button>

            </form>

            <a href="../portal-website.html">

                ← Kembali ke Portal

            </a>

        </div>

    </div>

</div>

</body>
</html>
