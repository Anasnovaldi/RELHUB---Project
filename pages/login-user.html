<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login User - RELHUB</title>

<link rel="stylesheet" href="../css/login-style.css">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <img src="../assets/logo.png" alt="logo">

        <h1>REL<span>HUB</span></h1>

        <div class="quote">
            "Setiap bantuan yang diberikan hari ini,
            dapat menjadi harapan bagi mereka yang
            sedang menghadapi kesulitan."
        </div>

    </div>

    <div class="right-panel">

        <div class="login-box">

            <h2>Login User</h2>

            <p class="subtitle">
                Masuk untuk melanjutkan ke platform RELHUB
            </p>


            <form action="dashboard-user.html">
    
                    <div class="input-group">
    
                        <label>Email</label>
    
                        <input
                        type="email"
                        placeholder="Masukkan email">
    
                    </div>
    
                    <div class="input-group">
    
                        <label>Password</label>
    
                        <input
                        type="password"
                        placeholder="Masukkan password">
    
                    </div>
    
                    <button
                        type="submit"
                        class="login-btn">

                            Login

                    </button>
    
                    <div class="signup-section">
    
                        <p>
                            Belum memiliki akun?
                        </p>
    
                        <a href="signin-user.html" class="signup-btn">
                            Sign Up Sekarang
                        </a>
    
                    </div>
            </form>

            <a href="../portal-website.html">

                ← Kembali ke Portal

            </a>

        </div>

    </div>

</div>

</body>
</html>
