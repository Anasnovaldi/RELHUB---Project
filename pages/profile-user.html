<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - RELHUB</title>

<link rel="stylesheet" href="../css/profile-user.css">


</head>
<body>

<div class="profile-container">

<a href="dashboard-user.html" class="back-btn">
    ← Kembali ke Dashboard
</a>

<div class="profile-card">

    <h1>Profil Saya</h1>

    <form>

        <div class="profile-picture">
            <img src="../logo-finance/10.png" alt="Profile">
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" value="Muhammad" readonly>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" value="muhammad" readonly>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" value="user@gmail.com" readonly>
        </div>

        <div class="form-group">
            <label>Nomor HP</label>
            <input type="text" value="08123456789" readonly>
        </div>

        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" value="2000-01-01" readonly>
        </div>

        <div class="form-group">
            <label>Status Relawan</label>
            <input type="text" value="Belum Terdaftar" readonly>
        </div>

        <div class="button-group">
            <button type="button" class="edit-btn">
                Edit
            </button>

            <button type="submit" class="save-btn">
                Simpan
            </button>
        </div>

    </form>

</div>

</div>

</body>
</html>
