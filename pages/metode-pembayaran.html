<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metode Pembayaran - RELHUB</title>
    <link rel="stylesheet" href="../css/pembayaran-style.css">
</head>
<body>

<div class="container">

    <div class="left-panel">
        <img src="../assets/logo.png" alt="logo">
        <h1>REL<span>HUB</span></h1>
        <p>
            Setiap rupiah yang Anda donasikan
            dapat menjadi harapan bagi mereka
            yang sedang menghadapi kesulitan.
        </p>
        <div class="quote">
            "Kebaikan sekecil apapun akan
            sangat berarti bagi mereka
            yang membutuhkan."
        </div>
    </div>

    <div class="right-panel">
        <div class="payment-container">
            <h2>Pilih Metode Pembayaran</h2>

            <div class="payment-card">

                <div class="method-section">
                    <h3>Transfer Bank</h3>
                    <div class="logo-grid">
                        <a href="donasi.html?method=bni" class="logo-box">
                            <img src="../logo-finance/4.png" alt="BNI">
                        </a>
                        <a href="donasi.html?method=bri" class="logo-box">
                            <img src="../logo-finance/5.png" alt="BRI">
                        </a>
                        <a href="donasi.html?method=bca" class="logo-box">
                            <img src="../logo-finance/6.png" alt="BCA">
                        </a>
                    </div>
                </div>

                <div class="method-section">
                    <h3>Digital Money</h3>
                    <div class="logo-grid">
                        <a href="donasi.html?method=gopay" class="logo-box">
                            <img src="../logo-finance/9.png" alt="GoPay">
                        </a>
                        <a href="donasi.html?method=dana" class="logo-box">
                            <img src="../logo-finance/8.png" alt="DANA">
                        </a>
                        <a href="donasi.html?method=ovo" class="logo-box">
                            <img src="../logo-finance/7.png" alt="OVO">
                        </a>
                    </div>
                </div>

                <div class="method-section">
                    <h3>Uang Tunai</h3>
                    <div class="logo-grid">
                        <a href="donasi.html?method=indomaret" class="logo-box">
                            <img src="../logo-finance/10.png" alt="Indomaret">
                        </a>
                        <a href="donasi.html?method=alfamart" class="logo-box">
                            <img src="../logo-finance/11.png" alt="Alfamart">
                        </a>
                        <a href="donasi.html?method=alfamidi" class="logo-box">
                            <img src="../logo-finance/12.png" alt="Alfamidi">
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
