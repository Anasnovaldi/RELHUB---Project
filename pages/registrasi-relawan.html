<!DOCTYPE html>

<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Relawan - RELHUB</title>

<link rel="stylesheet" href="../css/registrasi-user.css">

</head>
<body>

<div class="container">

<div class="volunteer-card">

    <h1>Pendaftaran Relawan</h1>

    <p>
        Lengkapi data berikut untuk menjadi relawan RELHUB.
    </p>

    <form>

        <div class="form-group">
            <label>Foto KTP</label>
            <input
            type="file"
            name="ktp_image"
            accept="image/*">
        </div>

        <div class="form-group">
            <label>Foto Sertifikat Keahlian</label>
            <input
            type="file"
            name="certificate_image"
            accept="image/*">
        </div>

        <div class="form-group">
            <label>Keahlian 1</label>
            <input
            type="text"
            name="skill_1"
            placeholder="Contoh: Pertolongan Pertama">
        </div>

        <div class="form-group">
            <label>Keahlian 2</label>
            <input
            type="text"
            name="skill_2"
            placeholder="Contoh: Komunikasi">
        </div>

        <div class="form-group">
            <label>Keahlian 3</label>
            <input
            type="text"
            name="skill_3"
            placeholder="Contoh: Logistik">
        </div>

        <button type="submit" class="register-btn">
            Daftar Relawan
        </button>

    </form>

</div>

</div>

</body>
</html>
