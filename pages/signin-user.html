<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up User - RELHUB</title>

<link rel="stylesheet" href="../css/login-style.css">

</head>

<body>

<div class="container">

    <div class="login-wrapper">

        <div class="left-panel">

            <img src="../assets/logo.png" alt="RELHUB">

            <h1>REL<span>HUB</span></h1>

            <p>
                Mulailah perjalanan Anda
                untuk membantu sesama melalui
                platform kemanusiaan RELHUB.
            </p>

            <div class="quote">
                Setiap bantuan yang diberikan hari ini
                dapat menjadi harapan bagi mereka yang
                sedang menghadapi kesulitan.
            </div>

        </div>

        <div class="right-panel">

            <div class="login-box">

                <h2>Buat Akun</h2>

                <p class="subtitle">
                    Daftarkan akun RELHUB Anda
                </p>

                <form>

                    <div class="input-group">

                        <label>Username</label>

                        <input
                        type="text"
                        placeholder="Masukkan username">

                    </div>

                    <div class="input-group">

                        <label>Email</label>

                        <input
                        type="email"
                        placeholder="Masukkan email">

                    </div>

                    <div class="input-group">

                        <label>Nomor Telepon</label>

                        <input
                        type="tel"
                        placeholder="08xxxxxxxxxx">

                    </div>

                    <div class="input-group">

                        <label>Tanggal Lahir</label>

                        <input
                        type="date">

                    </div>

                    <div class="input-group">

                        <label>Password</label>

                        <input
                        type="password"
                        placeholder="Masukkan password">

                    </div>

                    <button
                    type="submit"
                    class="login-btn">

                        Sign Up

                    </button>

                </form>

                <a
                href="login-user.html"
                class="back-link">

                    Sudah punya akun? Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
